name: Build Ghostgram IPA
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fix Submodules (Magic Fix)
        run: |
          git submodule init
          # Насильно прописываем все ссылки на случай, если .gitmodules пустой или сломан
          git config submodule."submodules/rlottie/rlottie".url https://github.com/TelegramMessenger/rlottie.git
          git config submodule."build-system/bazel-rules/rules_apple".url https://github.com/ali-fareed/rules_apple.git
          git config submodule."build-system/bazel-rules/rules_swift".url https://github.com/bazelbuild/rules_swift.git
          git config submodule."build-system/bazel-rules/apple_support".url https://github.com/bazelbuild/apple_support.git
          git config submodule."submodules/TgVoipWebrtc/tgcalls".url https://github.com/TelegramMessenger/tgcalls.git
          git config submodule."third-party/libvpx/libvpx".url https://github.com/webmproject/libvpx.git
          git config submodule."third-party/webrtc/webrtc".url https://github.com/ali-fareed/webrtc.git
          git config submodule."build-system/bazel-rules/rules_xcodeproj".url https://github.com/MobileNativeFoundation/rules_xcodeproj.git
          git config submodule."submodules/LottieCpp/lottiecpp".url https://github.com/ali-fareed/lottiecpp.git
          git config submodule."third-party/dav1d/dav1d".url https://github.com/ali-fareed/dav1d.git
          git config submodule."third-party/td/td".url https://github.com/tdlib/td.git
          git config submodule."third-party/XcodeGen".url https://github.com/yonaskolb/XcodeGen.git
          git config submodule."build-system/bazel-rules/sourcekit-bazel-bsp".url https://github.com/ali-fareed/sourcekit-bazel-bsp.git
          
          git submodule sync
          git submodule update --init --recursive --depth 1

      - name: Prepare Files
        run: |
          mkdir -p build-input
          echo '{}' > build-system/appstore-configuration.json
          echo '{"api_id": 2040, "api_hash": "b18441a1ff607e10aee99999f35d94bd"}' > build-system/data-config.json

      - name: Build IPA
        run: |
          python3 build-system/Make/Make.py \
            --cacheDir="$HOME/telegram-bazel-cache" \
            build \
            --configurationPath=build-system/appstore-configuration.json \
            --buildNumber=100 \
            --configuration release_arm64 \
            --xcodeManagedCodesigning \
            --overrideXcodeVersion

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Ghostgram-IPA
          path: build/artifacts/*.ipa
